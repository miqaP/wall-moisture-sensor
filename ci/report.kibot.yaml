kibot:
  version: 1

globals:
  resources_dir: resources
  field_lcsc_part: "LCSC Part"
  solder_mask_color: black
  pcb_finish: ENIG

filters:
  - name: only_jlc_parts
    comment: "Only parts with JLC (LCSC Part) code"
    type: generic
    include_only:
      - column: "LCSC Part"
        regex: '^C\d+'

variants:
  - name: rotated
    comment: "Rotate for JLCPCB"
    type: kibom
    variant: rotated
    pre_transform: _rot_footprint_jlcpcb

outputs:
  - name: "report"
    comment: "Generates a report about the design."
    type: "report"
    dir: "report"
    options:
      converted_output: "%f-%i%I%v.%x"
      eurocircuits_class_target: "3B"
      eurocircuits_reduce_holes: 0
      template: "full"
      do_convert: true
      convert_to: "pdf"
  - name: "pdf_sch_print_dark"
    type: "pdf_sch_print"
    dir: "Schematic"
    options:
      all_pages: true
      background_color: true
      monochrome: false
      dnf_filter: ""
      output: "%f-%i%I%v-dark.%x"
  - name: "pdf_sch_print_default"
    type: "pdf_sch_print"
    dir: "Schematic"
    options:
      all_pages: true
      monochrome: false
      output: "%f-%i%I%v-default.%x"
  - name: "pdf_sch_print_mono"
    type: "pdf_sch_print"
    dir: "Schematic"
    options:
      all_pages: true
      monochrome: true
      output: "%f-%i%I%v-mono.%x"

  - name: html_bom

    type: bom
    dir: bom
    options:
      output: "%f-%i.%x"
      group_fields: ['part', 'part lib', 'value', 'mpn', 'footprint', 'footprint lib', 'voltage', 'tolerance', 'current', 'power']      
      columns:
        - field: References
          name: Reference Designator
        - field: Quantity Per PCB
          name: Quantity
        - field: Value
          name: Value
        - field: MPN
          name: "Manufacturer Part Number"
        - Footprint
        - field: Description
          name: Description
        - Datasheet
        - field: "LCSC"
          name: "LCSC Part #"
      format: "HTML"
    comment: 'Generates a dark version of an interactive web page to browse the schematic and/or PCB differences between git commits.'
    type: 'kiri'
    dir: 'kiri-dark'
    options:
      background_color: '#000000'
      keep_generated: true
      zones: 'global'
    layers: all
  - name: 'Kiri Light'
    comment: 'Generates a light version of an interactive web page to browse the schematic and/or PCB differences between git commits.'
    type: 'kiri'
    dir: 'kiri-light'
    options:
      keep_generated: true
      zones: 'global'
    layers: all
  - name: "Markdown components table"
    comment: "All LCSC components in HTML"
    type: bom
    dir: BOM
    options:
      output: "%f_%i.%x"
      exclude_filter: "only_jlc_parts"
      columns:
        - field: Value
          name: Value
        - field: References
          name: Reference
        - field: "Extra Values"
          name: "Extra Values"
        - Footprint
        - field: MFN
          name: "Manufacturer"
        - field: MPN
          name: "Manufacturer Part Number"
        - Datasheet
        - Sheetpath
        - field: "LCSC Part"
          name: "LCSC Part #"
        - field: "Quantity Per PCB"
          name: "Quantity"
      format: "HTML"
      html:
        datasheet_as_link: "Datasheet"
        lcsc_link: true

  - name: "Info"
    comment: "Records information about the current run."
    type: "info"
    dir: "CI"
    options:
      environment: "names"
      output: "%f-%i%I%v.%x"
