kibot:
  version: 1

globals:
  resources_dir: resources

preflight:
  check_zone_fills: true
  erc:
    dont_stop: false
    warnings_as_errors: true
    format: "JSON,HTML,CSV"
    filters: [
      error: "lib_symbol_issues",
      error: "footprint_link_issues",
      error: "simulation_model_issue"
    ]
