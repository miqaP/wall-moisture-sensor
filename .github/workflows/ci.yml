name: CI

on:
  push:
    branches:
      - main
      - test-ci-workflow

env:
  PROJECT_NAME: wall_moisture-hardware


permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  Preflight:
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: "1"
          submodules: "true"
      - name: Run Kibot
        uses: INTI-CMNB/KiBot@v2_dk8
        with:
          config: ci/preflight.kibot.yaml
          dir: output
          schema: "${{ env.PROJECT_NAME }}.kicad_sch"
          board: "${{ env.PROJECT_NAME }}.kicad_pcb"
          verbose: 3
      - name: "Setup jq"
        uses: dcarbone/install-jq-action@v2
      - name: Parse ERC
        run: |
          erc_warnings=$(cat output/$PROJECT_NAME-erc.json | jq '[try .violations[] | select(.severity == "warning")] | length')
          erc_errors=$(cat output/$PROJECT_NAME-erc.json | jq '[try .violations[] | select(.severity == "error")] | length')
          cat <<EOF > output/erc_validation.md
          ### ERC Report
          - **Errors**: $erc_errors
          - **Warnings**: $erc_warnings
          - **Link**: [HTML Report]($PROJECT_NAME-erc.html)
          EOF
          cat output/erc_validation.md
      - name: Parse DRC
        run: |
          drc_warnings=$(cat output/$PROJECT_NAME-drc.json | jq '[try .violations[] | select(.severity == "warning")] | length')
          drc_errors=$(cat output/$PROJECT_NAME-drc.json | jq '[try .violations[] | select(.severity == "error")] | length')
          cat <<EOF > output/drc_validation.md
          ### DRC Report
          - **Errors**: $drc_errors
          - **Warnings**: $drc_warnings
          - **Link**: [HTML Report]($PROJECT_NAME-drc.html)
          EOF
          cat output/drc_validation.md

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Preflight
          path: output
  Render_3D_Top_Angled:
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: "1"
          submodules: "true"
      - name: Run Kibot
        uses: INTI-CMNB/KiBot@v2_dk8
        with:
          config: ci/3d_render_top_angled.kibot.yaml
          dir: output
          schema: "${{ env.PROJECT_NAME }}.kicad_sch"
          board: "${{ env.PROJECT_NAME }}.kicad_pcb"
          verbose: 3
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Render_Top_Angled
          path: output
  Report:
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: "5"
          submodules: "true"
      - name: Move template to root
        run: |
          ls -l
          mkdir template
          cp ci/template/* template/
          ls -l template
      - name: Run Kibot
        run: |
          mkdir -p /root/.ssh/ && touch /root/.ssh/known_hosts
          ssh-keygen -R github.com
          ssh-keyscan github.com >> /root/.ssh/known_hosts
          echo "github.com ssh-rsa ssh-rsa " >> /root/.ssh/known_hosts
          eval $(ssh-agent)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' | ssh-add - > /dev/null
          kibot -vvv -d output -c ci/config.kibot.yaml -e $PROJECT_NAME.kicad_sch -b $PROJECT_NAME.kicad_pcb
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Report
          path: output
  PCBPrint:
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: "1"
          submodules: "true"
      - name: Move template to root
        run: |
          ls -l
          mkdir template
          cp ci/template/* template/
          ls -l template
      - name: Run Kibot for Dark PCBPrint
        uses: INTI-CMNB/KiBot@v2_dk8
        with:
          config: ci/pcb_print_dark.kibot.yaml
          dir: output
          schema: "${{ env.PROJECT_NAME }}.kicad_sch"
          board: "${{ env.PROJECT_NAME }}.kicad_pcb"
          verbose: 3
      - name: Run Kibot for Light PCBPrint
        uses: INTI-CMNB/KiBot@v2_dk8
        with:
          config: ci/pcb_print_light.kibot.yaml
          dir: output
          schema: "${{ env.PROJECT_NAME }}.kicad_sch"
          board: "${{ env.PROJECT_NAME }}.kicad_pcb"
          verbose: 3
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PCBPrint
          path: output
  Render_3D_Top:
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: "1"
          submodules: "true"
      - name: Run Kibot
        uses: INTI-CMNB/KiBot@v2_dk8
        with:
          config: ci/3d_render_top.kibot.yaml
          dir: output
          schema: "${{ env.PROJECT_NAME }}.kicad_sch"
          board: "${{ env.PROJECT_NAME }}.kicad_pcb"
          verbose: 3
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Render_Top
          path: output

  Step:
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: "1"
          submodules: "true"
      - name: Run Kibot
        uses: INTI-CMNB/KiBot@v2_dk8
        with:
          config: ci/3d_step_file.kibot.yaml
          dir: output
          schema: "${{ env.PROJECT_NAME }}.kicad_sch"
          board: "${{ env.PROJECT_NAME }}.kicad_pcb"
          verbose: 3
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Step
          path: output

  Render_3D_Bottom:
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: "1"
          submodules: "true"
      - name: Run Kibot
        uses: INTI-CMNB/KiBot@v2_dk8
        with:
          config: ci/3d_render_bottom.kibot.yaml
          dir: output
          schema: "${{ env.PROJECT_NAME }}.kicad_sch"
          board: "${{ env.PROJECT_NAME }}.kicad_pcb"
          verbose: 3
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Render_Bottom
          path: output
  Build_Jekyll:
    runs-on: ubuntu-latest
    needs:
      [
        Preflight,
        Render_3D_Top,
        Render_3D_Bottom,
        Render_3D_Top_Angled,
        Report,
        PCBPrint,
        Step,
      ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Preflight
          path: output
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: output
      - name: Move artifact files
        run: |
          ls -l
          ls -l output
          ls -l output/Render_Top_Angled
          ls -l output/Report
          ls -l output/Step
          find .
          mkdir export
          mkdir html
          mkdir images
          mkdir documents
          mkdir KiRiDark
          mkdir KiRiLight
          mv output/drc_validation.md ./
          mv output/erc_validation.md ./
          mv output/$PROJECT_NAME-drc.html ./
          mv output/$PROJECT_NAME-erc.html ./
          mv output/Step/Step/$PROJECT_NAME-3D.step ./$PROJECT_NAME-3D.step
          mv output/Report/report/$PROJECT_NAME-report.txt ./$PROJECT_NAME-report.md
          mv output/Render_Top/$PROJECT_NAME-3D_blender_top.png images/$PROJECT_NAME-3D_blender_top.png
          mv output/Render_Bottom/$PROJECT_NAME-3D_blender_top.png images/$PROJECT_NAME-3D_blender_bottom.png
          mv output/Render_Top_Angled/$PROJECT_NAME-3D_blender_top.png images/$PROJECT_NAME-3D_blender_top_angled.png
          mv output/Report/IBOM/$PROJECT_NAME-ibom.html export/$PROJECT_NAME-ibom.html
          mv output/Report/BOM/$PROJECT_NAME_bom.html export/$PROJECT_NAME-bom.html
          mv output/Report/Schematic/$PROJECT_NAME-schematic-default.pdf documents/$PROJECT_NAME-schematic-default.pdf
          mv output/Report/Schematic/$PROJECT_NAME-schematic-dark.pdf documents/$PROJECT_NAME-schematic-dark.pdf
          mv output/Report/Schematic/$PROJECT_NAME-schematic-mono.pdf documents/$PROJECT_NAME-schematic-mono.pdf
          mv output/PCBPrint/PCBPrintDark/$PROJECT_NAME-united-Dark.pdf documents/$PROJECT_NAME-pcb-dark.pdf
          mv output/PCBPrint/PCBPrintLight/$PROJECT_NAME-united-Light.pdf documents/$PROJECT_NAME-pcb-light.pdf
          mv output/Report/KiRiDark ./ || true
          mv output/Report/KiRiLight ./ || true
          mv output/Report/JLCPCB/$PROJECT_NAME-JLCPCB.zip export/$PROJECT_NAME-JLCPCB.zip
          mv output/Report/JLCPCB/BOM/$PROJECT_NAME_bom_jlc.csv export/$PROJECT_NAME_bom_jlc.csv
          mv output/Report/JLCPCB/PickAndPlace/$PROJECT_NAME_cpl_jlc.csv export/$PROJECT_NAME_cpl_jlc.csv
          cp export/$PROJECT_NAME-JLCPCB.zip export/$PROJECT_NAME-Eurocircuits.zip
          mv output/Report/Eurocircuits/BOM/$PROJECT_NAME_bom_jlc.csv export/$PROJECT_NAME_bom_Eurocircuits.csv
          cp export/$PROJECT_NAME_cpl_jlc.csv export/$PROJECT_NAME_cpl_Eurocircuits.csv
          rm -rf output
          ls -l
          ls -l export
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
          future: true
      - name: Move KiRi files directly to site
        run: |
          ls -l
          sudo chown -R $USER:$USER ./_site/
          cp -r ./KiRiDark ./_site/ || true
          cp -r ./KiRiLight ./_site/ || true
          find .
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  Deploy_Jekyll:
    needs: Build_Jekyll
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
